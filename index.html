<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI音読コーチ 🎤</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        #targetText { font-size: 1.2rem; font-weight: bold; margin: 20px 0; padding: 15px; border: 2px dashed #4caf50; border-radius: 10px; min-height: 50px; background: #fff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 25px; transition: 0.3s; margin: 5px; font-weight: bold; }
        #recordBtn { background-color: #ff5252; color: white; }
        #submitBtn { background-color: #2196f3; color: white; display: none; }
        #result { margin-top: 20px; padding: 15px; border-radius: 10px; background-color: #e3f2fd; display: none; text-align: left; }
        .score-display { font-size: 32px; color: #ff5722; font-weight: bold; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #ff5722; padding-bottom: 5px; }
    </style>
</head>
<body>

    <h2>AI音読コーチ 🎤</h2>

    <div class="container">
        <div class="form-group">
            <label>クラス：</label>
            <select id="classSelect">
                <option value="1-1">1年1組</option>
                <option value="1-2">1年2組</option>
                <option value="1-3">1年3組</option>
            </select>
        </div>
        <div class="form-group">
            <label>出席番号：</label>
            <select id="numberSelect"></select> </div>
        <div class="form-group">
            <label>お名前：</label>
            <input type="text" id="nameInput" placeholder="例：大谷 翔平">
        </div>

        <p style="font-size: 0.9rem; color: #666;">先生からの課題文です。</p>
        <div id="targetText">読み込み中...</div>

        <button id="recordBtn">🔴 録音スタート</button>
        <button id="submitBtn">📩 AIに提出する</button>

        <div id="result">
            <div id="scoreArea" class="score-display"></div>
            <div id="messageArea"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-mziP_o5YidAkVQ9RA-uNUMP2zNpzIGT4PPimXYyxs9SmyRXIQeoxNXhHnbFXZLFqjA/exec";

        // 出席番号のプルダウン(1-35)を自動作成
        const numberSelect = document.getElementById('numberSelect');
        for (let i = 1; i <= 35; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i + "番";
            numberSelect.appendChild(opt);
        }

        let mediaRecorder;
        let audioChunks = [];

        // 課題文の取得
        async function fetchTask() {
            const className = document.getElementById('classSelect').value;
            try {
                const res = await fetch(`${GAS_URL}?className=${className}`);
                const data = await res.json();
                document.getElementById('targetText').innerText = data.targetText;
            } catch (e) {
                document.getElementById('targetText').innerText = "課題の読み込みに失敗しました。";
            }
        }
        fetchTask();
        document.getElementById('classSelect').addEventListener('change', fetchTask);

        // 録音処理
        document.getElementById('recordBtn').onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('recordBtn').innerText = "🔴 録音スタート";
                document.getElementById('submitBtn').style.display = "inline-block";
            } else {
                audioChunks = [];
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.start();
                document.getElementById('recordBtn').innerText = "⏹️ 録音を終了";
                document.getElementById('submitBtn').style.display = "none";
            }
        };

        // 提出処理
        document.getElementById('submitBtn').onclick = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/wav' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                document.getElementById('submitBtn').innerText = "解析中...";
                document.getElementById('submitBtn').disabled = true;

                const payload = {
                    className: document.getElementById('classSelect').value,
                    studentId: document.getElementById('numberSelect').value + " " + document.getElementById('nameInput').value,
                    targetText: document.getElementById('targetText').innerText,
                    audio: reader.result
                };

                try {
                    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
                    const data = await res.json();
                    
                    document.getElementById('result').style.display = "block";
                    document.getElementById('scoreArea').innerText = (data.total_score_100 || data.total_score) + "点";
                    document.getElementById('messageArea').innerText = data.feedback_for_student?.encouraging_message || data.feedback || "解析完了しました。";
                } catch (e) {
                    alert("送信に失敗しました。");
                } finally {
                    document.getElementById('submitBtn').innerText = "📩 AIに提出する";
                    document.getElementById('submitBtn').disabled = false;
                }
            };
        };
    </script>
</body>
</html>
